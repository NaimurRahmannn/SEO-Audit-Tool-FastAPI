# Alembic configuration for the SEO Audit Tool backend.
# The database URL is loaded at runtime from app settings in migrations/env.py,
# so sqlalchemy.url is intentionally left blank here.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use OS-native path separators when generating version files.
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]
# Optional: format generated migrations. Disabled by default.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
